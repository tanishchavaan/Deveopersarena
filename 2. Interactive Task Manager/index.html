<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Task Manager</h1>
        <button id="themeToggle">🌙</button>
    </header>

    <form id="taskForm">
        <input type="text" id="taskInput" placeholder="Enter new task..." required>
        <select id="prioritySelect">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
        </select>
        <input type="date" id="dueDate">
        <button type="submit">Add</button>
    </form>

    <div class="filters">
        <button data-filter="all" class="active">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Completed</button>
    </div>

    <ul id="taskList"></ul>

    <div class="stats">
        <p>Total: <span id="totalTasks">0</span></p>
        <p>Active: <span id="activeTasks">0</span></p>
        <p>Completed: <span id="completedTasks">0</span></p>
        <button id="clearCompleted">Clear Completed</button>
    </div>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
