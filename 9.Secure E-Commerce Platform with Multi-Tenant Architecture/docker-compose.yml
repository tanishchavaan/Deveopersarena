version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"

  postgres-public:
    image: postgres:15-alpine
    container_name: db-public
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  postgres-tenant1:
    image: postgres:15-alpine
    container_name: db-tenant1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tenant1_db
    ports:
      - "5433:5432"

  postgres-tenant2:
    image: postgres:15-alpine
    container_name: db-tenant2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tenant2_db
    ports:
      - "5434:5432"
